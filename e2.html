            { id: 65, question: "Ali wants to ...... his English, so he practices as much as he can.", options: ["teach", "write", "improve", "test"], correctAnswer: "improve", hint: "علي يريد أن يطور اللغة الإنجليزية لذا فهو يمارسها: يعلم، يكتب، يطور، اختبار" },

            { id: 66, question: "I always ........ the shopping.", options: ["done", "did", "do", "does"], correctAnswer: "do", hint: "أنا دائماً أقوم بالتسوق: done، did، do، does" },

            { id: 67, question: "Computers that stores informatin have", options: ["station", "robbed", "brain", "memory"], correctAnswer: "memory", hint: "اجهزة الكمبيوتر التي تخزن المعلومات لديها : ذاكرة،دماغ،مسروقة،محطة" }

        ];

        // حالة التطبيق

        const userAnswers = {}; // لتخزين إجابات المستخدم

        let totalScore = 0;

        const scorePerQuestion = 2;

        const maxScore = questions.length * scorePerQuestion; // 67 سؤال * 2 نقطة = 134

        // دالة تحديث النتيجة الإجمالية في الواجهة

        function updateTotalScoreDisplay() {

            document.getElementById('total-score').textContent = `${totalScore}`;

        }

        // دالة التحقق من الإجابة وتحديث الواجهة والنقاط

        function checkAnswer(questionId, selectedAnswer, button) {

            const question = questions.find(q => q.id === questionId);

            if (!question) return;

            // 1. حساب النتيجة

            const isCorrect = selectedAnswer === question.correctAnswer;

            const previousAnswer = userAnswers[questionId];

            // تحديث النتيجة الإجمالية

            if (previousAnswer === undefined) {

                if (isCorrect) {

                    totalScore += scorePerQuestion;

                }

            } else if (previousAnswer.selectedAnswer !== selectedAnswer) {

                // إذا غير إجابته

                if (previousAnswer.isCorrect) {

                    totalScore -= scorePerQuestion; // طرح النتيجة السابقة

                }

                if (isCorrect) {

                    totalScore += scorePerQuestion; // إضافة النتيجة الجديدة

                }

            } else {

                // أعاد اختيار نفس الإجابة، لا تغيير في النتيجة

                return;

            }

            // تخزين الإجابة الجديدة

            userAnswers[questionId] = { selectedAnswer, isCorrect };

            // تحديث عرض النتيجة

            updateTotalScoreDisplay();

            // 2. تحديث تلوين زر الإجابة وإظهار الترجمة

            const questionContainer = document.getElementById(`q-${questionId}`);

            // إزالة الألوان السابقة من جميع الأزرار لنفس السؤال

            const buttons = questionContainer.querySelectorAll('button');

            buttons.forEach(btn => {

                btn.classList.remove('correct-answer', 'wrong-answer', 'correct-highlight', 'ring-2', 'ring-offset-2', 'ring-opacity-50');

                btn.classList.add('bg-gray-100', 'hover:bg-gray-200', 'border-gray-300');

            });

            // تلوين الزر المختار

            button.classList.remove('bg-gray-100', 'hover:bg-gray-200', 'border-gray-300');

            button.classList.add('ring-2', 'ring-offset-2', 'ring-opacity-50');

            if (isCorrect) {

                // إجابة صحيحة (أخضر)

                button.classList.add('correct-answer', 'border-green-500', 'ring-green-300');

            } else {

                // إجابة خاطئة (أحمر)

                button.classList.add('wrong-answer', 'border-red-500', 'ring-red-300');

                // تلوين الإجابة الصحيحة (الأخضر الفاتح)

                const correctButton = questionContainer.querySelector(`button[data-answer="${question.correctAnswer.replace(/\\/g, '\\\\').replace(/"/g, '\\"')}"]`);

                if (correctButton) {

                    correctButton.classList.remove('bg-gray-100', 'hover:bg-gray-200', 'border-gray-300');

                    correctButton.classList.add('correct-highlight', 'border-green-300');

                }

            }

            // إظهار الترجمة (hint)

            const hintElement = questionContainer.querySelector('.question-hint');

            if (hintElement) {

                hintElement.classList.remove('hidden'); // إزالة فئة الإخفاء

            }

        }

        // دالة إنشاء واجهة السؤال

        function createQuestionElement(question) {

            const card = document.createElement('div');

            card.id = `q-${question.id}`;

            card.className = 'question-card bg-white p-5 sm:p-6 rounded-xl border border-gray-200 shadow-md';

            // عنوان السؤال

            const title = document.createElement('p');

            title.className = 'text-gray-900 font-semibold mb-3 text-lg leading-relaxed';

            // استخدام mr-2 لرقم السؤال في LTR

            title.innerHTML = `<span class="text-sm font-bold text-indigo-600 mr-2">${question.id}.</span> ${question.question}`;

            card.appendChild(title);

            // الترجمة (تلميح) - تظهر بعد الإجابة وتكون RTL

            const hint = document.createElement('p');

            hint.className = 'question-hint hidden text-gray-700 text-sm mt-4 rtl-hint pt-2';

            hint.textContent = `الترجمة: ${question.hint}`;

            card.appendChild(hint);

            // حاوية الأزرار

            const buttonContainer = document.createElement('div');

            buttonContainer.className = 'grid grid-cols-1 sm:grid-cols-2 gap-3 mt-4';

            question.options.forEach(answer => {

                if (answer) { // تأكد من أن الخيار ليس فارغًا (مثل Q50)

                    const button = document.createElement('button');

                    button.textContent = answer;

                    button.setAttribute('data-answer', answer);

                    button.className = 'py-3 px-4 rounded-lg font-medium border-2 transition duration-150 ease-in-out ' +

                                       'bg-gray-100 text-gray-700 border-gray-300 hover:bg-gray-200 shadow-sm text-base text-left focus:outline-none';

                    button.onclick = function() {

                        checkAnswer(question.id, answer, this);

                    };

                    buttonContainer.appendChild(button);

                }

            });

            card.appendChild(buttonContainer);

            return card;

        }

        // تهيئة التطبيق عند تحميل الصفحة

        window.onload = function() {

            const container = document.getElementById('questions-container');

            // عرض الأسئلة

            questions.forEach(q => {

                container.appendChild(createQuestionElement(q));

            });

            // عرض النتيجة الأولية (0)

            updateTotalScoreDisplay();

        };

    </script>
