        // حالة التطبيق

        const userAnswers = {}; // لتخزين إجابات المستخدم

        let totalScore = 0;

        const maxScore = questions.length * 2; // 74 سؤال * 2 نقطة

        // دالة تحديث النتيجة الإجمالية في الواجهة

        function updateTotalScoreDisplay() {

            document.getElementById('total-score').textContent = `${totalScore}`;

        }

        // دالة التحقق من الإجابة وتحديث الواجهة والنقاط

        function checkAnswer(questionId, selectedAnswer) {

            const question = questions.find(q => q.id === questionId);

            if (!question) return;

            const isCorrect = selectedAnswer.toUpperCase() === question.correctAnswer.toUpperCase();

            // تحقق إذا كان المستخدم قد أجاب مسبقًا

            const previousAnswer = userAnswers[questionId];

            // تحديث النتيجة الإجمالية

            if (previousAnswer === undefined) {

                // إذا كانت الإجابة الأولى صحيحة، أضف النقاط

                if (isCorrect) {

                    totalScore += question.score;

                }

            } else if (previousAnswer.isCorrect !== isCorrect) {

                // إذا غير إجابته وكانت الإجابة الجديدة صحيحة، أضف النقاط (أو العكس)

                if (isCorrect) {

                    totalScore += question.score; // أضف النقاط

                } else {

                    totalScore -= question.score; // اطرح النقاط

                }

            }

            // تخزين الإجابة الجديدة

            userAnswers[questionId] = { selectedAnswer, isCorrect };

            // تحديث عرض النتيجة

            updateTotalScoreDisplay();

            // إظهار الترجمة وتحديث تلوين الزر

            const questionContainer = document.getElementById(`q-${questionId}`);

            // 1. إظهار الترجمة (hint)

            const hintElement = questionContainer.querySelector('.question-hint');

            if (hintElement) {

                hintElement.classList.remove('hidden'); // إزالة فئة الإخفاء

            }

            // 2. تحديث تلوين زر الإجابة

            // إزالة الألوان السابقة من جميع الأزرار لنفس السؤال

            const buttons = questionContainer.querySelectorAll('button');

            buttons.forEach(btn => {

                btn.classList.remove('correct-answer', 'wrong-answer', 'bg-green-100', 'bg-red-100', 'border-green-500', 'border-red-500', 'ring-2', 'ring-offset-2', 'ring-opacity-50', 'bg-green-50', 'border-green-300'); // إزالة كل الألوان

                btn.classList.add('bg-gray-100', 'hover:bg-gray-200', 'border-gray-300');

            });

            // تلوين الزر المختار

            const selectedButton = questionContainer.querySelector(`button[data-answer="${selectedAnswer}"]`);

            if (selectedButton) {

                selectedButton.classList.remove('bg-gray-100', 'hover:bg-gray-200', 'border-gray-300');

                selectedButton.classList.add('ring-2', 'ring-offset-2', 'ring-opacity-50');

                if (isCorrect) {

                    // إجابة صحيحة (أخضر)

                    selectedButton.classList.add('correct-answer', 'border-green-500', 'ring-green-300');

                } else {

                    // إجابة خاطئة (أحمر)

                    selectedButton.classList.add('wrong-answer', 'border-red-500', 'ring-red-300');

                    // تلوين الإجابة الصحيحة باللون الأخضر الخفيف للإشارة

                    const correctButton = questionContainer.querySelector(`button[data-answer="${question.correctAnswer}"]`);

                    if (correctButton) {

                        correctButton.classList.remove('bg-gray-100', 'hover:bg-gray-200', 'border-gray-300');

                        correctButton.classList.add('bg-green-50', 'border-green-300');

                    }

                }

            }

        }

        // دالة إنشاء واجهة السؤال

        function createQuestionElement(question) {

            const card = document.createElement('div');

            card.id = `q-${question.id}`;

            card.className = 'question-card bg-white p-5 sm:p-6 rounded-xl border border-gray-200 shadow-md';

            // عنوان السؤال

            const title = document.createElement('p');

            title.className = 'text-gray-900 font-semibold mb-3 text-lg leading-relaxed';

            // استخدام mr-2 لرقم السؤال في LTR

            title.innerHTML = `<span class="text-sm font-bold text-indigo-600 mr-2">${question.id}.</span> ${question.question}`;

            card.appendChild(title);

            // الترجمة (تلميح) - الآن تظهر بعد الإجابة

            const hint = document.createElement('p');

            // استخدام فئة 'rtl-hint' الجديدة لتطبيق RTL و الحدود على اليمين

            hint.className = 'question-hint hidden text-gray-500 text-sm mb-4 rtl-hint pt-2';

            hint.textContent = `الترجمة: ${question.hint}`;

            card.appendChild(hint);

            // حاوية الأزرار

            const buttonContainer = document.createElement('div');

            buttonContainer.className = 'flex flex-col sm:flex-row gap-3 mt-4';

            ['TRUE', 'FALSE'].forEach(answer => {

                const button = document.createElement('button');

                button.textContent = answer === 'TRUE' ? 'صحيح (True)' : 'خطأ (False)';

                button.setAttribute('data-answer', answer);

                button.className = 'flex-1 py-3 px-4 rounded-lg font-medium border-2 transition duration-150 ease-in-out ' +

                                   'bg-gray-100 text-gray-700 border-gray-300 hover:bg-gray-200 shadow-sm text-base focus:outline-none';

                button.onclick = () => checkAnswer(question.id, answer);

                buttonContainer.appendChild(button);

            });

            card.appendChild(buttonContainer);

            return card;

        }

        // تهيئة التطبيق عند تحميل الصفحة

        window.onload = function() {

            const container = document.getElementById('questions-container');

            // عرض الأسئلة

            questions.forEach(q => {

                container.appendChild(createQuestionElement(q));

            });

            // عرض النتيجة الأولية (0)

            updateTotalScoreDisplay();

        };

    </script>

</body>
