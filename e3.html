    <script src="https://cdn.tailwindcss.com"></script>

    <style>

        /* تعريف خط Inter ليكون حديثاً ومناسباً */

        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap');

        body {

            font-family: 'Inter', sans-serif;

            background-color: #f7f9fb;

        }

        /* الألوان المخصصة للإطار */

        .border-correct-full { border-color: #10b981; } /* أخضر كامل */

        .border-incorrect-full { border-color: #ef4444; } /* أحمر كامل */

        /* برتقالي فاتح */

        .border-partial { border-color: #fcd34d; }

        .bg-partial { background-color: #fffbeb; }

        /* ستايل مخصص لزر التحقق ليظهر بشكل جيد */

        .check-button {

            transition: all 0.2s;

            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);

        }

        .check-button:hover {

            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1);

            transform: translateY(-1px);

        }

        /* ستايل الخيارات */

        .option-label {

            transition: background-color 0.3s, border-color 0.3s;

            cursor: pointer;

            border: 2px solid #e5e7eb;

            text-align: left; /* المحاذاة لليسار لخيارات اللغة الإنجليزية */

        }

        .option-label:hover {

            border-color: #6366f1;

        }

        /* إخفاء مربعات الاختيار الأصلية */

        .option-input {

            display: none;

        }

        /* الإجابات بعد التحقق */

        .bg-correct { background-color: #d1fae5; border-color: #10b981; color: #065f46; } /* أخضر فاتح */

        .bg-incorrect { background-color: #fee2e2; border-color: #ef4444; color: #991b1b; } /* أحمر فاتح */

        /* تلوين مربع التحديد عند الاختيار */

        .checked-indicator {

            transition: all 0.15s ease-in-out;

            display: inline-block;

            width: 1rem;

            height: 1rem;

            border-radius: 0.25rem;

            border: 2px solid #6366f1;

            flex-shrink: 0;

            margin-left: 0.75rem; /* مسافة عن النص */

        }

        .option-input:checked + .checked-indicator {

            background-color: #6366f1;

            border-color: #6366f1;

            position: relative;

        }

        /* أيقونة علامة الصح (للتأثير البصري) */

        .option-input:checked + .checked-indicator::after {

            content: '✓';

            color: white;

            font-size: 0.7rem;

            position: absolute;

            top: 50%;

            left: 50%;

            transform: translate(-50%, -50%);

        }

    </style>

            { id: 62, question: "The meaning of attractive in English is", options: ["pleasant to look at", "beautiful", "option3", "option4"], correct: ["pleasant to look at", "beautiful"], translation: "معنى كلمة جذاب في اللغة الانجليزية هو (ممتع للنظر - جميل)" },

            { id: 63, question: "\"what is the meaning of \"\" has left\"\" in this sentence Sameer is 18 years old but he has left school.\"", options: ["has gone away", "has changed", "option3", "option4"], correct: ["has gone away", "has changed"], translation: "ما معنى 'لقد غادر' في هذه الجملة سمير يبلغ من العمر 18 عاما ولكنه ترك المدرسة؟" },

        ];

        // متغير لحفظ النتيجة الحالية

        let currentScore = 0;

        let answeredQuestions = {}; // لحفظ حالة التحقق ودرجة كل سؤال

        // نقطة كل سؤال ثابتة (2)

        const SCORE_PER_QUESTION = 2;

        const totalMaxScore = quizData.length * SCORE_PER_QUESTION;

        document.getElementById('max-score').textContent = totalMaxScore.toFixed(2);

        // ----------------------------------------------------------------------

        // 1. منطق احتساب الدرجات (الخطأ يأكل الصواب)

        // ----------------------------------------------------------------------

        // هذه الدالة تعتمد على المنطق الذي طلبته: يتم توزيع الدرجة الكاملة (2) بالتساوي على عدد الخيارات الصحيحة.

        // كل إجابة خاطئة مختارة تخصم قيمة تلك الإجابة الصحيحة.

        function calculateScore(questionId) {

            const questionData = quizData.find(q => q.id === questionId);

            if (!questionData) return 0;

            const form = document.getElementById(`q-form-${questionId}`);

            if (!form) return 0;

            const correctAnswers = questionData.correct;

            const numCorrectOptions = correctAnswers.length;

            // إذا لم يكن هناك إجابات صحيحة محددة مسبقاً، تكون النتيجة صفر

            if (numCorrectOptions === 0) return 0;

            // قيمة كل إجابة صحيحة

            const valuePerCorrectOption = SCORE_PER_QUESTION / numCorrectOptions;

            let correctChosenCount = 0;

            let incorrectChosenCount = 0;

            const inputs = form.querySelectorAll(`input[name="q${questionId}"]:checked`);

            // تحديد الإجابات المختارة

            const selectedOptions = Array.from(inputs).map(input => input.value);

            // 1. حساب الإجابات الصحيحة والخاطئة المختارة

            selectedOptions.forEach(option => {

                if (correctAnswers.includes(option)) {

                    correctChosenCount++;

                } else {

                    incorrectChosenCount++;

                }

            });

            // 2. تطبيق القاعدة: (الصحيح المختار - الخطأ المختار) * قيمة النقطة الواحدة

            let score = correctChosenCount * valuePerCorrectOption;

            const deduction = incorrectChosenCount * valuePerCorrectOption;

            score = score - deduction;

            // التأكد من أن النتيجة لا تقل عن الصفر

            return parseFloat(Math.max(0, score).toFixed(2));

        }

        // ----------------------------------------------------------------------

        // 2. تحديث الواجهة عند التحقق

        // ----------------------------------------------------------------------

        function checkAnswer(questionId) {

            // منع التحقق مرة أخرى

            if (answeredQuestions[questionId]) {

                 showMessage('تم التحقق مسبقاً', 'لقد قمت بالتحقق من هذا السؤال بالفعل.');

                 return;

            }

            const questionData = quizData.find(q => q.id === questionId);

            const form = document.getElementById(`q-form-${questionId}`);

            const questionCard = document.getElementById(`q-card-${questionId}`);

            const checkBtn = document.getElementById(`check-btn-${questionId}`);

            if (!questionData || !form || !questionCard) return;

            const correctAnswers = questionData.correct;

            const inputs = form.querySelectorAll(`input[name="q${questionId}"]`);

            const selectedInputs = form.querySelectorAll(`input[name="q${questionId}"]:checked`);

            let totalCorrectOptions = correctAnswers.length;

            let correctSelected = 0;

            let incorrectSelected = 0;

            // 1. تلوين الخيارات (الأخضر والأحمر) وتجميع الإحصائيات

            inputs.forEach(input => {

                const label = input.closest('label');

                const isCorrect = correctAnswers.includes(input.value);

                const isSelected = input.checked;

                // إزالة التنسيقات الأولية وإضافة مؤشر التعطيل

                label.classList.remove('border-gray-300', 'border-indigo-400', 'border-indigo-500');

                label.classList.add('pointer-events-none');

                // إظهار مربع التحديد كنص ثابت

                const indicator = label.querySelector('.checked-indicator');

                if(indicator) indicator.classList.remove('bg-indigo-500', 'border-indigo-500');

                if (isCorrect) {

                    if (isSelected) {

                        label.classList.add('bg-correct', 'border-green-500');

                        correctSelected++;

                    } else {

                        // خيار صحيح لم يتم اختياره - يتم تلوينه للأخضر لإظهار أنه كان يجب اختياره

                        label.classList.add('bg-correct', 'border-green-500');

                    }

                } else { // خيار خاطئ

                    if (isSelected) {

                        label.classList.add('bg-incorrect', 'border-red-500');

                        incorrectSelected++;

                    }

                }

            });

            // 2. حساب النتيجة وتحديث النتيجة الإجمالية

            const newScore = calculateScore(questionId);

            // حفظ حالة السؤال

            answeredQuestions[questionId] = { checked: true, score: newScore };

            // خصم الدرجة السابقة لهذا السؤال (إذا وجدت) وإضافة الدرجة الجديدة

            currentScore = quizData.map(q => answeredQuestions[q.id]?.score || 0).reduce((a, b) => a + b, 0);

            // 3. تلوين إطار السؤال

            questionCard.classList.remove('border-gray-300', 'border-partial', 'border-correct-full', 'border-incorrect-full');

            let borderColorClass = '';

            let resultHtml = '';

            // الترجمة تظهر دائماً بعد التحقق (في الأسفل)

            const translationHtml = `

                <div dir="rtl" class="text-gray-700 mt-3 p-3 bg-gray-100 rounded-lg border border-gray-300">

                    <p class="font-bold text-lg mb-1 text-indigo-700">ترجمة السؤال:</p>

                    <p>${questionData.translation}</p>

                </div>

            `;

            // الحالة الأولى: الإجابات صحيحة بالكامل (الدرجة = 2)

            if (newScore === SCORE_PER_QUESTION) {

                borderColorClass = 'border-correct-full';

                resultHtml = `<p class="font-bold p-2 text-center rounded-lg bg-green-100 text-green-700">ممتاز! حصلت على الدرجة الكاملة: ${newScore.toFixed(2)} درجة.</p>`;

            }

            // الحالة الثانية: الإجابات خاطئة بالكامل (النتيجة صفر)

            else if (newScore === 0) {

                 borderColorClass = 'border-incorrect-full';

                 resultHtml = `<p class="font-bold p-2 text-center rounded-lg bg-red-100 text-red-700">للأسف، النتيجة: ${newScore.toFixed(2)} درجة. راجع الخيارات الصحيحة والخاطئة.</p>`;

            }

            // الحالة الثالثة: جزئي (النتيجة بين 0 و 2)

            else {

                borderColorClass = 'border-partial';

                resultHtml = `<p class="font-bold p-2 text-center rounded-lg bg-yellow-100 text-yellow-700">نتيجة جزئية: ${newScore.toFixed(2)} درجة. تذكر: الخطأ يأكل الصواب.</p>`;

            }

            questionCard.classList.add(borderColorClass, 'border-4', 'shadow-lg');

            // عرض النتيجة الوصفية والترجمة

            const resultElement = document.getElementById(`q-result-${questionId}`);

            resultElement.innerHTML = resultHtml + translationHtml;

            // تحديث النتيجة الإجمالية

            updateTotalScoreDisplay();

            // تعطيل زر التحقق

            checkBtn.disabled = true;

            checkBtn.classList.remove('bg-indigo-500', 'hover:bg-indigo-600', 'check-button');

            checkBtn.classList.add('bg-gray-400', 'cursor-not-allowed');

        }

        // ----------------------------------------------------------------------

        // 3. تحديث عرض النتيجة الإجمالية

        // ----------------------------------------------------------------------

        function updateTotalScoreDisplay() {

            document.getElementById('total-score').textContent = currentScore.toFixed(2);

        }

        // ----------------------------------------------------------------------

        // 4. بناء هيكل الأسئلة في HTML

        // ----------------------------------------------------------------------

        function renderQuiz() {

            const container = document.getElementById('quiz-container');

            container.innerHTML = ''; // تفريغ الحاوية

            quizData.forEach(q => {

                const questionElement = document.createElement('div');

                questionElement.className = 'bg-white p-6 rounded-xl shadow-md transition-all duration-300 ease-in-out border border-gray-300';

                questionElement.id = `q-card-${q.id}`;

                // السؤال (اتجاه النص من اليسار لليمين)

                let html = `

                    <h2 class="text-xl font-semibold text-gray-800 mb-4" dir="ltr" style="text-align: left;">${q.id}. ${q.question}</h2>

                    <form id="q-form-${q.id}" class="space-y-3 mb-6">

                `;

                // الخيارات (تظهر من اليسار لليمين)

                q.options.forEach((option, index) => {

                    const optionId = `q${q.id}-opt${index}`;

                    html += `

                        <label for="${optionId}" class="option-label block p-3 rounded-lg flex items-center bg-white shadow-sm" dir="ltr">

                            <input type="checkbox" id="${optionId}" name="q${q.id}" value="${option}" class="option-input">

                            <span class="checked-indicator"></span>

                            <span class="flex-grow">${option}</span>

                        </label>

                    `;

                });

                // زر التحقق والنتيجة

                html += `

                    </form>

                    <div id="q-result-${q.id}" class="my-4"></div>

                    <button id="check-btn-${q.id}" onclick="checkAnswer(${q.id})"

                        class="check-button w-full bg-indigo-500 text-white font-bold py-3 rounded-xl hover:bg-indigo-600 transition duration-150">

                        تحقق من الإجابة (درجتان)

                    </button>

                `;

                questionElement.innerHTML = html;

                container.appendChild(questionElement);

            });

        }

        // 5. ربط وظيفة تلوين الـ Checkbox المخصص (للانتقال من التنسيق العادي إلى تنسيق التحديد)

        function attachCheckboxStyling() {

            document.querySelectorAll('.option-input').forEach(input => {

                input.addEventListener('change', function() {

                    const label = this.closest('label');

                    // هذا التلوين هو للتأثير التفاعلي قبل التحقق فقط

                    if (!answeredQuestions[input.name.substring(1)]) {

                        if (this.checked) {

                            label.classList.add('border-indigo-500');

                        } else {

                            label.classList.remove('border-indigo-500');

                        }

                    }

                });

            });

        }

        // 6. تشغيل التطبيق

        window.onload = () => {

            renderQuiz();

            attachCheckboxStyling();

            updateTotalScoreDisplay();

        };

    </script>
