        }

        ];

        // تهيئة محتوى الأسئلة في HTML (تم تعديل أماكن الدرجة والمرجع)
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('question-container');
            let htmlContent = '';
            questionsData.forEach(q => {
                htmlContent += `<li class="question-item" data-question-id="q${q.id}" data-correct-answers="${q.correct.join(',')}" data-reference="${q.reference}">
                    <div class="question-header">
                        ${q.id}. ${q.text}
                    </div>
                    <div class="options">`;
                
                // Add options (a, b, c, d)
                // هنا نحسب عدد الخيارات المتاحة في السؤال لتحديد ما إذا تم اختيارها كلها لاحقا
                const availableOptions = Object.keys(q.options);
                
                availableOptions.forEach(optKey => {
                    if (q.options[optKey]) {
                        htmlContent += `<div>
                            <input type="checkbox" id="q${q.id}_${optKey}" name="q${q.id}" value="${optKey}">
                            <label for="q${q.id}_${optKey}">(${optKey}) ${q.options[optKey]}</label>
                        </div>`;
                    }
                });

                htmlContent += `</div>
                    <div class="meta-info">
                        <span class="reference">مرجع: ص${q.reference}</span>
                        <span class="score">الدرجة: 2</span>
                    </div>
                    <div class="feedback" id="feedback-q${q.id}"></div>
                </li>`;
            });
            container.innerHTML = htmlContent;
        });

        // دالة التحقق من الإجابات الجديدة (تطبيق منطق "الخطأ يأكل الصواب" والدرجات الجزئية)
        function checkAnswers() {
            let totalScore = 0;
            let incorrectCount = 0;
            const scorePerQuestion = 2;
            const questionItems = document.querySelectorAll('.question-item');
            const resultsDiv = document.getElementById('results');

            // 1. إعادة تعيين التصميمات والنتائج
            questionItems.forEach(item => {
                item.classList.remove('correct', 'incorrect');
                const feedbackDiv = item.querySelector('.feedback');
                feedbackDiv.classList.remove('show');
                feedbackDiv.innerHTML = '';
            });

            // 2. التحقق من كل سؤال وتطبيق منطق الدرجات
            questionsData.forEach(qData => {
                const qId = `q${qData.id}`;
                const item = document.querySelector(`[data-question-id="${qId}"]`);
                if (!item) return; // تخطي إذا لم يتم العثور على العنصر

                const correctArr = qData.correct;
                const totalCorrectOptions = correctArr.length;
                const feedbackDiv = document.getElementById(`feedback-${qId}`);
                
                const selectedCheckboxes = document.querySelectorAll(`input[name="${qId}"]:checked`);
                const userAnswerArr = Array.from(selectedCheckboxes).map(cb => cb.value);

                let questionScore = 0;
                let finalScoreToDisplay = 0;
                
                // قيمة الدرجة لكل خيار صحيح
                const valuePerOption = totalCorrectOptions > 0 ? scorePerQuestion / totalCorrectOptions : 0;
                
                let correctPicks = 0;
                let incorrectPicks = 0;

                userAnswerArr.forEach(ans => {
                    if (correctArr.includes(ans)) {
                        correctPicks++;
                    } else {
                        incorrectPicks++;
                    }
                });

                // تطبيق منطق "الخطأ يأكل الصواب": الصافي = الصحيح المختار - الخاطئ المختار
                const netPicks = correctPicks - incorrectPicks;
                
                // الدرجة = الصافي * قيمة الخيار الواحد. (لا يسمح بالدرجة السالبة)
                questionScore = Math.max(0, netPicks * valuePerOption);
                finalScoreToDisplay = questionScore;

                totalScore += questionScore;

                // التحقق من الإجابة الكاملة: إذا كانت الدرجة المحتسبة هي الدرجة الكاملة (2)
                const isCompletelyCorrect = (finalScoreToDisplay.toFixed(2) === scorePerQuestion.toFixed(2)) && (incorrectPicks === 0);

                if (isCompletelyCorrect) {
                    item.classList.add('correct');
                } else {
                    item.classList.add('incorrect');
                    incorrectCount++;
                }
                
                // بناء رسالة التغذية الراجعة
                const correctFeedback = correctArr.map(ans => `<span class="correct-highlight">${getOptionText(ans)}</span>`).join(' و ');
                
                let feedbackMessage = `الدرجة المحتسبة لهذا السؤال: <span class="partial-score">${finalScoreToDisplay.toFixed(2)}</span> من 2.00`;

                if (isCompletelyCorrect) {
                    feedbackMessage = "تهانينا! الإجابة صحيحة وكاملة (2.00/2.00).";
                } else {
                    feedbackMessage += `<br>ملاحظة: ${totalCorrectOptions} خيار صحيح، قيمة كل خيار ${valuePerOption.toFixed(2)}.<br>تم اختيار ${correctPicks} صحيح و ${incorrectPicks} خاطئ.<br>الإجابة الصحيحة المطلوبة: ${correctFeedback}`;
                }

                feedbackDiv.innerHTML = feedbackMessage;
                feedbackDiv.classList.add('show');
            });

            // 3. عرض النتائج النهائية
            const totalMaxScore = questionsData.length * scorePerQuestion;
            resultsDiv.style.display = 'block';
            resultsDiv.style.backgroundColor = (totalScore === totalMaxScore) ? '#d4edda' : '#f8d7da';
            resultsDiv.style.color = (totalScore === totalMaxScore) ? '#155724' : '#721c24';
            
            resultsDiv.innerHTML = `
                لقد انتهيت من تقييم الحل. ✅<br>
                الدرجة الإجمالية التي حصلت عليها: <strong class="final-score">${totalScore.toFixed(2)}</strong> من ${totalMaxScore} <br>
                عدد الأسئلة التي لم تحصل على الدرجة الكاملة: <span class="error-count">${incorrectCount}</span> سؤال.
            `;
        }
    </script>
</body>
</html>
